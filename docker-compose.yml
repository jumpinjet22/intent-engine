version: '3.8'

services:
  # Ollama for LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: doorbell-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - doorbell-network

  # Intent Engine application
  intent-engine:
    image: ${INTENT_ENGINE_IMAGE:-jumpnjet22/intent-engine:latest}
    container_name: doorbell-intent-engine
    depends_on:
      - ollama
      - mqtt
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=llama3.2:3b
      - LLM_ENABLED=${LLM_ENABLED:-true}
      - LLM_TIMEOUT_S=${LLM_TIMEOUT_S:-8}
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID:-}
      - MQTT_TLS_ENABLED=${MQTT_TLS_ENABLED:-false}
      - MQTT_TLS_CA_CERT=${MQTT_TLS_CA_CERT:-}
      - MQTT_TOPIC_FRIGATE=${MQTT_TOPIC_FRIGATE:-frigate/events}
      - MQTT_TOPIC_DOORBELL_PRESS=${MQTT_TOPIC_DOORBELL_PRESS:-doorbell/doorbell_press}
      - MQTT_TOPIC_HUMAN_ACTIVE=${MQTT_TOPIC_HUMAN_ACTIVE:-doorbell/human_active}
      - MQTT_TOPIC_DIALOGUE_ANSWER=${MQTT_TOPIC_DIALOGUE_ANSWER:-doorbell/dialogue/answer}
      - MQTT_TOPIC_SESSION_STATE=${MQTT_TOPIC_SESSION_STATE:-doorbell/session/state}
      - MQTT_TOPIC_INTENT=${MQTT_TOPIC_INTENT:-doorbell/intent}
      - MQTT_TOPIC_TTS_REQUEST=${MQTT_TOPIC_TTS_REQUEST:-doorbell/tts/request}
      - MQTT_TOPIC_TTS_STATUS=${MQTT_TOPIC_TTS_STATUS:-doorbell/tts/status}
      - MQTT_TOPIC_ESCALATE=${MQTT_TOPIC_ESCALATE:-doorbell/escalate}
      - CONFIDENCE_AUTO_HANDLE=${CONFIDENCE_AUTO_HANDLE:-0.75}
      - CONFIDENCE_CLARIFY=${CONFIDENCE_CLARIFY:-0.5}
      - CLARIFICATION_MAX=${CLARIFICATION_MAX:-2}
      - SAFETY_KEYWORDS=${SAFETY_KEYWORDS:-police,emergency,fire,gas,leak,injury,weapon,warrant,lawsuit,sign,contract}
      - TALKBACK_MOCK_ENABLED=${TALKBACK_MOCK_ENABLED:-true}
    volumes:
      - ./data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - doorbell-network

  # MQTT Broker for Frigate events
  mqtt:
    image: eclipse-mosquitto:2
    container_name: doorbell-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - doorbell-network

  # Optional: Frigate (if not already running)
  # Uncomment if you don't have Frigate set up elsewhere
  # frigate:
  #   image: ghcr.io/blakeblackshear/frigate:stable
  #   container_name: frigate
  #   privileged: true
  #   restart: unless-stopped
  #   shm_size: "256mb"
  #   devices:
  #     - /dev/bus/usb:/dev/bus/usb  # Coral USB
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - ./frigate/config.yml:/config/config.yml
  #     - ./frigate/storage:/media/frigate
  #     - type: tmpfs
  #       target: /tmp/cache
  #       tmpfs:
  #         size: 1000000000
  #   ports:
  #     - "5000:5000"
  #     - "8554:8554"  # RTSP
  #     - "8555:8555/tcp"  # WebRTC
  #     - "8555:8555/udp"  # WebRTC
  #   environment:
  #     FRIGATE_RTSP_PASSWORD: "password"
  #   networks:
  #     - doorbell-network

  # Web UI for monitoring and configuration (optional)
  web-ui:
    image: ${WEB_UI_IMAGE:-jumpnjet22/web-ui:latest}
    container_name: doorbell-web-ui
    ports:
      - "8080:8080"
    depends_on:
      - intent-engine
      - mqtt
    environment:
      - API_HOST=intent-engine
      - MQTT_HOST=mqtt
      - MQTT_TRIGGER_TOPIC=${MQTT_TOPIC_DOORBELL_PRESS:-doorbell/doorbell_press}
    restart: unless-stopped
    networks:
      - doorbell-network

networks:
  doorbell-network:
    driver: bridge

volumes:
  ollama_models:

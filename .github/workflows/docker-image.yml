name: Build and Push Images

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-intent-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx with Docker Build Cloud
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: jumpnjet22/fast-builder

      - name: Build and push intent-engine
        uses: docker/build-push-action@v6
        with:
          context: ./intent-engine
          file: ./intent-engine/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            jumpnjet22/intent-engine:latest
            jumpnjet22/intent-engine:${{ github.sha }}

  build-web-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx with Docker Build Cloud
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: jumpnjet22/fast-builder

      - name: Build and push web-ui
        uses: docker/build-push-action@v6
        with:
          context: ./web-ui
          file: ./web-ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            jumpnjet22/web-ui:latest
            jumpnjet22/web-ui:${{ github.sha }}

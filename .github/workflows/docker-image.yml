name: Build & Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build & push intent-engine
        run: |
          docker build ./intent-engine -t jumpnjet22/intent-engine:latest
          docker push jumpnjet22/intent-engine:latest

      - name: Build & push web-ui
        run: |
          docker build ./web-ui -t jumpnjet22/web-ui:latest
          docker push jumpnjet22/web-ui:latest

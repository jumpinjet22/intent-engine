version: '3.8'

services:
  intent-engine:
    build: ./intent-engine
    image: ${INTENT_ENGINE_IMAGE:-doorbell-intent-engine:latest}
    container_name: doorbell-intent-engine
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - LLM_MODEL=${LLM_MODEL:-llama3.2:3b}
      - LLM_ENABLED=${LLM_ENABLED:-true}
      - LLM_TIMEOUT_S=${LLM_TIMEOUT_S:-8}
      - MQTT_HOST=${MQTT_HOST:-mqtt}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID:-}
      - MQTT_TLS_ENABLED=${MQTT_TLS_ENABLED:-false}
      - MQTT_TLS_CA_CERT=${MQTT_TLS_CA_CERT:-}
      - MQTT_TOPIC_FRIGATE=${MQTT_TOPIC_FRIGATE:-frigate/events}
      - MQTT_TOPIC_DOORBELL_PRESS=${MQTT_TOPIC_DOORBELL_PRESS:-doorbell/doorbell_press}
      - MQTT_TOPIC_HUMAN_ACTIVE=${MQTT_TOPIC_HUMAN_ACTIVE:-doorbell/human_active}
      - MQTT_TOPIC_DIALOGUE_ANSWER=${MQTT_TOPIC_DIALOGUE_ANSWER:-doorbell/dialogue/answer}
      - MQTT_TOPIC_SESSION_STATE=${MQTT_TOPIC_SESSION_STATE:-doorbell/session/state}
      - MQTT_TOPIC_INTENT=${MQTT_TOPIC_INTENT:-doorbell/intent}
      - MQTT_TOPIC_TTS_REQUEST=${MQTT_TOPIC_TTS_REQUEST:-doorbell/tts/request}
      - MQTT_TOPIC_TTS_STATUS=${MQTT_TOPIC_TTS_STATUS:-doorbell/tts/status}
      - MQTT_TOPIC_ESCALATE=${MQTT_TOPIC_ESCALATE:-doorbell/escalate}
      - CONFIDENCE_AUTO_HANDLE=${CONFIDENCE_AUTO_HANDLE:-0.75}
      - CONFIDENCE_CLARIFY=${CONFIDENCE_CLARIFY:-0.5}
      - CLARIFICATION_MAX=${CLARIFICATION_MAX:-2}
      - SAFETY_KEYWORDS=${SAFETY_KEYWORDS:-police,emergency,fire,gas,leak,injury,weapon,warrant,lawsuit,sign,contract}
      - TALKBACK_MOCK_ENABLED=${TALKBACK_MOCK_ENABLED:-true}
    volumes:
      - ./data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

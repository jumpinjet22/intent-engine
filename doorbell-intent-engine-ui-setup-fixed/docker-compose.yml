version: '3.8'

services:
  # Ollama for LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: doorbell-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - doorbell-network

  # Intent Engine application
  intent-engine:
    build: ./intent-engine
    container_name: doorbell-intent-engine
    depends_on:
      - ollama
      - mqtt
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - FRIGATE_HOST=${FRIGATE_HOST:-frigate}
      - FRIGATE_PORT=${FRIGATE_PORT:-5000}
      # UniFi Protect Integration API (optional, for G6 Entry talkback + RTSP discovery)
      - PROTECT_BASE_URL=${PROTECT_BASE_URL}
      - PROTECT_API_KEY=${PROTECT_API_KEY}
      - PROTECT_VERIFY_SSL=${PROTECT_VERIFY_SSL:-false}
      - PROTECT_CAMERA_ID=${PROTECT_CAMERA_ID}
      - PROTECT_RTSP_QUALITY=${PROTECT_RTSP_QUALITY:-medium}
      # Or skip Protect entirely and provide a direct RTSP/RTSPS URL:
      - CAMERA_RTSP_URL=${CAMERA_RTSP_URL:-}
      - TTS_ENGINE=xtts  # or kokoro, piper
      - WHISPER_MODEL=base
      - LLM_MODEL=llama3.2:3b
      # Optional structured session logging (JSONL)
      - THOUGHT_LOG_ENABLED=${THOUGHT_LOG_ENABLED:-false}
      - THOUGHT_LOG_PATH=${THOUGHT_LOG_PATH:-/data/thinking.log.jsonl}
      - THOUGHT_LOG_INCLUDE_TRANSCRIPT=${THOUGHT_LOG_INCLUDE_TRANSCRIPT:-false}
      - THOUGHT_LOG_REDACT_PII=${THOUGHT_LOG_REDACT_PII:-true}
      # Editable response templates
      - TEMPLATES_PATH=${TEMPLATES_PATH:-/app/config/templates.yml}
      # People logging (snapshots + metadata)
      - PEOPLE_LOG_ENABLED=${PEOPLE_LOG_ENABLED:-false}
      - PEOPLE_LOG_DIR=${PEOPLE_LOG_DIR:-/data/people}
      - PEOPLE_LOG_SAVE_SNAPSHOT=${PEOPLE_LOG_SAVE_SNAPSHOT:-true}
      - PEOPLE_LOG_SAVE_THUMBNAIL=${PEOPLE_LOG_SAVE_THUMBNAIL:-false}
      - FRIGATE_API_KEY=${FRIGATE_API_KEY:-}
      # Frigate Face Library integration (repeat solicitor deterrence)
      - FRIGATE_FACES_ENABLED=${FRIGATE_FACES_ENABLED:-false}
      - FRIGATE_FACES_INTENTS=${FRIGATE_FACES_INTENTS:-solicitor}
      - FRIGATE_FACES_MIN_CONFIDENCE=${FRIGATE_FACES_MIN_CONFIDENCE:-0.85}
      - FRIGATE_FACES_PREFIX=${FRIGATE_FACES_PREFIX:-solicitor-}
      - FRIGATE_FACES_AUTO_TRAIN=${FRIGATE_FACES_AUTO_TRAIN:-true}
      - FRIGATE_FACES_TRAIN_MODE=${FRIGATE_FACES_TRAIN_MODE:-classify}
      - FRIGATE_FACES_NAME_MAXLEN=${FRIGATE_FACES_NAME_MAXLEN:-48}
      - FRIGATE_FACES_STORE_DIR=${FRIGATE_FACES_STORE_DIR:-/data/faces}
      - FRIGATE_FACES_DRY_RUN=${FRIGATE_FACES_DRY_RUN:-false}
    volumes:
      - ./config:/app/config
      - ./sounds:/app/sounds
      - ./data:/data
      - intent_cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - doorbell-network

  # MQTT Broker for Frigate events
  mqtt:
    image: eclipse-mosquitto:2
    container_name: doorbell-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - doorbell-network

  # Optional: Frigate (if not already running)
  # Uncomment if you don't have Frigate set up elsewhere
  # frigate:
  #   image: ghcr.io/blakeblackshear/frigate:stable
  #   container_name: frigate
  #   privileged: true
  #   restart: unless-stopped
  #   shm_size: "256mb"
  #   devices:
  #     - /dev/bus/usb:/dev/bus/usb  # Coral USB
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - ./frigate/config.yml:/config/config.yml
  #     - ./frigate/storage:/media/frigate
  #     - type: tmpfs
  #       target: /tmp/cache
  #       tmpfs:
  #         size: 1000000000
  #   ports:
  #     - "5000:5000"
  #     - "8554:8554"  # RTSP
  #     - "8555:8555/tcp"  # WebRTC
  #     - "8555:8555/udp"  # WebRTC
  #   environment:
  #     FRIGATE_RTSP_PASSWORD: "password"
  #   networks:
  #     - doorbell-network

  # Web UI for monitoring and configuration (optional)
  web-ui:
    build: ./web-ui
    container_name: doorbell-web-ui
    ports:
      - "8080:8080"
    depends_on:
      - intent-engine
      - mqtt
    environment:
      - API_HOST=intent-engine
      - MQTT_HOST=mqtt
      - PROTECT_BASE_URL=${PROTECT_BASE_URL:-}
      - PROTECT_CAMERA_ID=${PROTECT_CAMERA_ID:-}
      - MQTT_TRIGGER_TOPIC=${MQTT_TRIGGER_TOPIC:-doorbell/trigger}
    restart: unless-stopped
    networks:
      - doorbell-network

networks:
  doorbell-network:
    driver: bridge

volumes:
  ollama_models:
  intent_cache:

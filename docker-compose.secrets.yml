version: '3.8'

services:
  intent-engine:
    environment:
      - MQTT_USERNAME_FILE=/run/secrets/mqtt_username
      - MQTT_PASSWORD_FILE=/run/secrets/mqtt_password
    secrets:
      - mqtt_username
      - mqtt_password

secrets:
  mqtt_username:
    file: ./secrets/mqtt_username.txt
  mqtt_password:
    file: ./secrets/mqtt_password.txt

# Doorbell Intent Engine - Spoken response templates
# Edit these freely. The engine will pick one response at random from the list.
# Placeholders: {name} {company} {tracking} {appointment_time} {time_of_day} {location}

globals:
  # If you want the doorbell to disclose it's automated.
  # modes: never | handoff_only | always
  ai_disclosure_mode: always
  ai_disclosure: "This is an automated assistant."

  # Generic handoff message if an intent-specific handoff is not defined
  handoff:
    - "One moment please — I'm going to get the homeowner." 
    - "Hang tight. I'm notifying the homeowner now." 

templates:
  delivery:
    responses:
      - "Thanks! Please leave the package by the door."
      - "Appreciate it — you can leave it right by the door."
    handoff:
      - "Looks like this needs the homeowner. One moment please."

  guest:
    responses:
      - "Hey! You can hang out for a moment — I'll notify the homeowner you're here."
      - "Welcome! One moment — I'll let the homeowner know you're here."

  service:
    responses:
      - "Thanks for coming by. One moment while I notify the homeowner."
      - "Got it. Please wait a moment — I'm letting the homeowner know."

  question:
    responses:
      - "One moment — I'll get the homeowner to help with that."
      - "Good question. Hang tight while I notify the homeowner."

  emergency:
    responses:
      - "One moment — I'm alerting the homeowner right now."

  solicitor:
    responses:
      - "Hi! This is a no-soliciting household. Please leave written info in the mailbox, if needed."
      - "Thanks, but we don't do solicitation here. Please remove this address from your list."
    repeat:
      - "We’ve already said no. This is a no-soliciting household. Please leave the property."
      - "No thank you. This is a no-soliciting household. The homeowner has been notified and this visit is being recorded."
    handoff:
      - "This is a no-soliciting household. The homeowner has been notified and this visit is being recorded."

  unknown:

    responses:
      - "Hi there — how can I help you today?"
      - "Hello! What can I help you with?"